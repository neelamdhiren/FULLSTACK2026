<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .form-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-like {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 8px 16px;
            font-size: 0.9em;
            width: 100%;
            margin-top: 10px;
        }

        .btn-like:hover {
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .posts-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .posts-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .posts-count {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .post {
            border-left: 4px solid #667eea;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 5px;
            margin-bottom: 15px;
            transition: box-shadow 0.3s, transform 0.2s;
        }

        .post:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateX(5px);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .post-username {
            font-weight: 700;
            color: #667eea;
            font-size: 1.1em;
        }

        .post-timestamp {
            color: #999;
            font-size: 0.85em;
        }

        .post-content {
            color: #333;
            line-height: 1.6;
            margin-bottom: 15px;
            word-wrap: break-word;
        }

        .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .post-likes {
            color: #f5576c;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .likes-icon {
            font-size: 1.2em;
        }

        .post-id {
            color: #999;
            font-size: 0.8em;
            word-break: break-all;
        }

        .no-posts {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-style: italic;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #3c3;
            display: none;
        }

        .success.show {
            display: block;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            padding: 20px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
        }

        .refresh-btn:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 Social Media API</h1>
            <p>Create posts, view all posts, and interact with the community</p>
        </div>

        <!-- Error Message -->
        <div class="error" id="error-message"></div>

        <!-- Success Message -->
        <div class="success" id="success-message"></div>

        <!-- Create Post Form -->
        <div class="form-section">
            <h2>✍️ Create a New Post</h2>
            <form id="create-post-form">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="content">Content:</label>
                    <textarea id="content" name="content" placeholder="What's on your mind?" required></textarea>
                </div>

                <button type="submit" class="btn">📤 Post</button>
            </form>
        </div>

        <!-- All Posts Section -->
        <div class="posts-section">
            <h2>📰 All Posts</h2>
            <div id="posts-container">
                <div class="loading">
                    <span class="spinner"></span>Loading posts...
                </div>
            </div>
            <button class="refresh-btn" onclick="loadPosts()">🔄 Refresh</button>
        </div>
    </div>

    <script>
        // API Base URL
        const API_BASE_URL = 'http://localhost:3000';

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        // Show success message
        function showSuccess(message) {
            const successDiv = document.getElementById('success-message');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            setTimeout(() => {
                successDiv.classList.remove('show');
            }, 5000);
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            const options = {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            return date.toLocaleDateString('en-US', options);
        }

        // Load all posts
        async function loadPosts() {
            try {
                const postsContainer = document.getElementById('posts-container');
                postsContainer.innerHTML = '<div class="loading"><span class="spinner"></span>Loading posts...</div>';

                const response = await fetch(`${API_BASE_URL}/posts`);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message);
                }

                if (data.data.length === 0) {
                    postsContainer.innerHTML = '<div class="no-posts">No posts yet. Be the first to create one!</div>';
                    return;
                }

                // Display posts
                postsContainer.innerHTML = `<p class="posts-count">Total Posts: ${data.count}</p>`;

                data.data.forEach(post => {
                    const postHTML = `
                        <div class="post">
                            <div class="post-header">
                                <span class="post-username">@${post.username}</span>
                                <span class="post-timestamp">${formatDate(post.createdAt)}</span>
                            </div>
                            <div class="post-content">${escapeHtml(post.content)}</div>
                            <div class="post-footer">
                                <div>
                                    <div class="post-likes">
                                        <span class="likes-icon">❤️</span>
                                        <span>${post.likes} ${post.likes === 1 ? 'like' : 'likes'}</span>
                                    </div>
                                    <div class="post-id">ID: ${post._id}</div>
                                </div>
                            </div>
                            <button class="btn-like" onclick="likePost('${post._id}')">👍 Like This Post</button>
                        </div>
                    `;
                    postsContainer.innerHTML += postHTML;
                });

            } catch (error) {
                console.error('Error loading posts:', error);
                document.getElementById('posts-container').innerHTML = `<div class="no-posts">Error loading posts: ${error.message}</div>`;
                showError(`Failed to load posts: ${error.message}`);
            }
        }

        // Create new post
        document.getElementById('create-post-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const content = document.getElementById('content').value.trim();

            if (!username || !content) {
                showError('Please fill in all fields');
                return;
            }

            try {
                const submitBtn = e.target.querySelector('button[type="submit"]');
                submitBtn.disabled = true;

                const response = await fetch(`${API_BASE_URL}/posts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        content: content
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message);
                }

                // Reset form
                document.getElementById('create-post-form').reset();
                showSuccess('✅ Post created successfully!');

                // Reload posts
                setTimeout(() => {
                    loadPosts();
                }, 500);

            } catch (error) {
                console.error('Error creating post:', error);
                showError(`Failed to create post: ${error.message}`);
            } finally {
                const submitBtn = document.querySelector('button[type="submit"]');
                submitBtn.disabled = false;
            }
        });

        // Like a post
        async function likePost(postId) {
            try {
                const response = await fetch(`${API_BASE_URL}/posts/${postId}/like`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message);
                }

                showSuccess('❤️ Post liked!');
                setTimeout(() => {
                    loadPosts();
                }, 300);

            } catch (error) {
                console.error('Error liking post:', error);
                showError(`Failed to like post: ${error.message}`);
            }
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Load posts on page load
        loadPosts();
    </script>
</body>
</html>
